steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/ad-synth-ai:$COMMIT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/ad-synth-ai:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ad-synth-ai
      - "--image=gcr.io/$PROJECT_ID/ad-synth-ai:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--timeout=600"
      - "--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=TRUE,IMAGE_GEN_PROVIDER=vertexai"
      - "--set-secrets=JWT_SECRET_KEY=jwt-secret:latest,GOOGLE_CSE_API_KEY=google-cse-key:latest,GCP_PROJECT_ID=gcp-project-id:latest"

images:
  - "gcr.io/$PROJECT_ID/ad-synth-ai:$COMMIT_SHA"
